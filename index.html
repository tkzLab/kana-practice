let flowTimer = null;     // みる：①→②→③ の連続書き込みアニメ
let penIdx = 0;

function conv(k) {
  if (state.type !== 'kata') return k;
  return k.split('').map(ch => {
    const c = ch.charCodeAt(0);
    return (c >= 0x3041 && c <= 0x3096) ? String.fromCharCode(c + 0x60) : ch;
  }).join('');
}
const cur = () => FLAT[state.sel];
const starsTotal = () => Object.keys(state.done).length;
const N = FLAT.length;

/* =========================================================================
   小さなDOMヘルパ
   ========================================================================= */
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'style') el.setAttribute('style', attrs[k]);
    else if (k === 'class') el.className = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else if (k.startsWith('on') && typeof attrs[k] === 'function') el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] != null) el.setAttribute(k, attrs[k]);
  }
  if (children != null) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}
const stage = () => document.getElementById('stage');
function clearStage(){ const s = stage(); while (s.firstChild) s.removeChild(s.firstChild); }

/* =========================================================================
   画面遷移
   ========================================================================= */
function go(screen) {
  stopFlow();
  // write画面を離れる時は canvas のGPUバッキングストアを即時解放する
  // （iPad Safari で解放待ちの canvas がコンポジタのメモリ圧迫→黒タイル化を誘発するため）
  if (state.screen === 'write' && screen !== 'write' && canvasEl) {
    canvasEl.width = 0; canvasEl.height = 0; canvasEl = null;
  }
  state.screen = screen;
  render();
  if (screen === 'write') resetWrite();
  if (screen === 'clear') spawnConfetti();
}
function render() {
  clearStage();
  const fn = { home: Home, select: Select, grid: Grid, write: Write, clear: Clear }[state.screen];
  const s = stage();
  s.appendChild(fn());
  forceCompositorRepaint();
}
// 旧iPad Safari対策の名残（transformモードのフォールバック用に残置）。
// 2026-07-12 実機検証で、このdisplay同期トグルでは黒タイルは解消しないと判明
// （同一タスク内で戻すためコンポジタに変化が届かない）。根本対策は fitStage の
// zoom スケーリング。害はなく transform フォールバック時の保険として呼び続ける。
function forceCompositorRepaint() {
  dbg('repaintA');
  const scaler = document.getElementById('scaler');
  scaler.style.display = 'none';
  void scaler.offsetHeight;
  scaler.style.display = '';
}

function faceParts(opts) {
  // opts: {eyeTop,eyeL1,eyeL2,eyeW,eyeH, cheek?, mouthTop,mouthL,mouthW,mouthH, z}
  const z = opts.z ? `z-index:${opts.z};` : '';
  const parts = [
    h('span',{style:`position:absolute;top:${opts.eyeTop}px;left:${opts.eyeL1}px;width:${opts.eyeW}px;height:${opts.eyeH}px;border-radius:50%;background:#5A5246;${z}`}),
    h('span',{style:`position:absolute;top:${opts.eyeTop}px;left:${opts.eyeL2}px;width:${opts.eyeW}px;height:${opts.eyeH}px;border-radius:50%;background:#5A5246;${z}`}),
  ];
  if (opts.cheek) {
    parts.push(h('span',{style:`position:absolute;top:${opts.cheek.top}px;left:${opts.cheek.l1}px;width:22px;height:22px;border-radius:50%;background:#FFC2D1;opacity:.7;${z}`}));
    parts.push(h('span',{style:`position:absolute;top:${opts.cheek.top}px;left:${opts.cheek.l2}px;width:22px;height:22px;border-radius:50%;background:#FFC2D1;opacity:.7;${z}`}));
  }
  parts.push(h('span',{style:`position:absolute;top:${opts.mouthTop}px;left:${opts.mouthL}px;width:${opts.mouthW}px;height:${opts.mouthH}px;border:4px solid #5A5246;border-top:none;border-radius:0 0 ${opts.mouthW}px ${opts.mouthW}px;${z}`}));
  return parts;
}

/* 番号バッジ（書き始め） */
function arrowBadge(x, y, color, n) {
  return h('div',{style:`position:absolute;left:${x}px;top:${y}px;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:${color};color:#fff;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 rgba(90,82,70,.25);border:2px solid #fff;`},String(n));
}
/* 軌跡トレース線（pathLength=1 正規化。dashoffset 1→0 で書き込み） */
function tracePath(d, color) {
  const p = document.createElementNS(NS_SVG,'path');
  p.setAttribute('d',d); p.setAttribute('fill','none'); p.setAttribute('stroke',color);
  p.setAttribute('stroke-width','3.2'); p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
  p.setAttribute('pathLength','1'); p.style.strokeDasharray = '1 1'; p.style.strokeDashoffset = '1';
  return p;
}
/* まねする：なぞる手本。みると同じ KanjiVG字形を薄く敷く（無ければフォント字形にフォールバック） */
function faintGlyph(c) {
  const kvg = (state.type === 'kata' ? KVG_KATA : KVG)[c.k];
  if (kvg) {
    const svg = document.createElementNS(NS_SVG,'svg');
    svg.setAttribute('viewBox','0 0 109 109');
    svg.setAttribute('style','position:absolute;inset:0;width:300px;height:300px;pointer-events:none;');
    kvg.paths.forEach(d => {
      const p = document.createElementNS(NS_SVG,'path');
      p.setAttribute('d',d); p.setAttribute('fill','none'); p.setAttribute('stroke','#D6EAC8');
      p.setAttribute('stroke-width','11'); p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
      svg.appendChild(p);
    });
    return svg;
  }
  return h('span',{style:'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:230px;font-weight:900;color:#E0EFD7;line-height:1;pointer-events:none;'},conv(c.k));
}

/* みるパネルの中身を構築（あ＝KanjiVG実データ / その他＝フォント字形＋軌跡） */
function buildSeeBox() {
  const box = document.getElementById('see-box');
  if (!box) return;
  while (box.firstChild) box.removeChild(box.firstChild);
  const c = cur();
  const kvg = (state.type === 'kata' ? KVG_KATA : KVG)[c.k];
  const traj = trajSet()[c.k];
  const trace = [];

  if (kvg) {
    // KanjiVG：字形・番号・軌跡がすべて同一ソース＝完全一致（viewBox 109）
    const SC = 300 / 109;
    const svg = document.createElementNS(NS_SVG,'svg');
    svg.setAttribute('viewBox','0 0 109 109');
    svg.setAttribute('style','position:absolute;inset:0;width:300px;height:300px;pointer-events:none;overflow:visible;');
    kvg.paths.forEach(d => {
      const g = document.createElementNS(NS_SVG,'path');
      g.setAttribute('d',d); g.setAttribute('fill','none'); g.setAttribute('stroke','#2B2B2B');
      g.setAttribute('stroke-width','5.4'); g.setAttribute('stroke-linecap','round'); g.setAttribute('stroke-linejoin','round');
      svg.appendChild(g);
    });
    kvg.paths.forEach((d,i) => { const p = tracePath(d, ORDER[i % 5]); svg.appendChild(p); trace.push(p); });
    box.appendChild(svg);
    kvg.paths.forEach((d,i) => {
      const num = kvg.nums[i];
      box.appendChild(arrowBadge(+((num[0]+2)*SC).toFixed(1), +((num[1]-3)*SC).toFixed(1), ORDER[i % 5], i+1));
    });
  } else {
    // フォント字形（正しい形）＋ 軌跡トレース＋番号矢印（viewBox 100）
    box.appendChild(h('span',{style:'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:230px;font-weight:900;color:#544C40;line-height:1;pointer-events:none;'},conv(c.k)));
    if (traj) {
      const svg = document.createElementNS(NS_SVG,'svg');
      svg.setAttribute('viewBox','0 0 100 100');
      svg.setAttribute('style','position:absolute;inset:0;width:300px;height:300px;pointer-events:none;overflow:visible;');
      traj.paths.forEach((d,i) => { const p = tracePath(d, ORDER[i % 5]); svg.appendChild(p); trace.push(p); });
      box.appendChild(svg);
      traj.starts.forEach((p,i) => box.appendChild(arrowBadge(+(p[0]*3).toFixed(1), +(p[1]*3).toFixed(1), ORDER[i % 5], i+1)));
    }
  }
  box._trace = trace;
  box._count = trace.length || 1;
}

/* みる：①→②→③ の順に色付きラインを連続で書き込む（自動ループ） */
function startFlow() {
  stopFlow();
  const box = document.getElementById('see-box'); if (!box) return;
  const trace = box._trace || [];
  const total = box._count || 1;
  const STEP = 0.85, HOLD = 1.1, cycle = total * STEP + HOLD;
  const t0 = performance.now();
  flowTimer = setInterval(() => {
    const el = ((performance.now() - t0) / 1000) % cycle;
    const flow = Math.min(el / STEP, total);
    trace.forEach((p,i) => {
      const frac = Math.max(0, Math.min(1, flow - i));
      p.style.strokeDashoffset = (1 - frac).toFixed(3);
    });
  }, 33);
}
function stopFlow() { if (flowTimer) { clearInterval(flowTimer); flowTimer = null; } }

function resetWrite() {
  stopFlow();
  wipeCanvas();
  buildSeeBox();
  startFlow();
}

/* 描画キャンバス */
function penColor(){ return PEN_COLORS[(penIdx++) % PEN_COLORS.length]; }
function wipeCanvas(){ if (canvasEl) canvasEl.getContext('2d').clearRect(0,0,canvasEl.width,canvasEl.height); }
// zoom / transform どちらのスケーリング下でも正しい座標換算
// （offsetX/Y は zoom 下の挙動にブラウザ差があるため使わない）
function canvasPos(e){
  const r = canvasEl.getBoundingClientRect();
  return { x: (e.clientX - r.left) * canvasEl.width / r.width,
           y: (e.clientY - r.top) * canvasEl.height / r.height };
}
function down(e){
  if (!canvasEl) return;
  try { canvasEl.setPointerCapture(e.pointerId); } catch(_){}
  const ctx = canvasEl.getContext('2d');
  ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = penColor();
  ctx.beginPath();
  const p = canvasPos(e);
  ctx.moveTo(p.x, p.y);
  drawing = true;
}
function move(e){
  if (!drawing) return;
  const ctx = canvasEl.getContext('2d');
  const p = canvasPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}
function up(){ drawing = false; }

function toClear(){ state.done[cur().k] = true; go('clear'); }

    h('span',{style:'position:relative;font-size:110px;font-weight:900;color:#FF7FA1;line-height:1;z-index:2;'},conv(c.k)),
  ]);
  faceParts({eyeTop:96,eyeL1:96,eyeL2:128,eyeW:14,eyeH:18,mouthTop:120,mouthL:108,mouthW:24,mouthH:16,z:3}).forEach(p=>starWrap.appendChild(p));
  root.appendChild(starWrap);

  root.appendChild(h('div',{style:"font-family:'Mochiy Pop One',sans-serif;font-size:80px;color:#FF5C86;margin-top:14px;text-shadow:0 4px 0 #fff;"},'クリア！'));
  root.appendChild(h('div',{style:'font-size:30px;font-weight:900;color:#C76389;'},'「'+conv(c.k)+'」が かけたよ！　よくできました🎵'));

  root.appendChild(h('div',{style:'display:flex;align-items:center;white-space:nowrap;gap:12px;background:#fff;padding:13px 28px;border-radius:999px;box-shadow:0 6px 0 rgba(90,82,70,.08);margin-top:22px;animation:appear .5s ease-out both;'},[
    h('span',{style:'font-size:22px;font-weight:900;color:#7E7563;'},'スタンプ'),
    h('span',{style:'font-size:30px;'},'⭐'),
    h('span',{style:'font-size:22px;font-weight:900;color:#FF7FA1;'},'ぜんぶで '+starsTotal()+'こ'),
    h('span',{style:'font-size:18px;font-weight:900;color:#FF7FA1;background:#FFE0EC;padding:4px 12px;border-radius:999px;white-space:nowrap;'},'+1 ゲット！'),
  ]));

  root.appendChild(h('div',{style:'display:flex;gap:20px;margin-top:28px;'},[
    h('div',{class:'clickable',onClick:()=>go('write'),style:'display:inline-flex;align-items:center;white-space:nowrap;height:70px;padding:0 36px;border-radius:999px;background:#fff;color:#9C937F;font-size:25px;font-weight:900;box-shadow:0 6px 0 rgba(90,82,70,.12);'},'↺ もういちど'),
    h('div',{class:'clickable',onClick:()=>{state.sel=(state.sel+1)%N;go('grid');},style:'display:inline-flex;align-items:center;white-space:nowrap;height:70px;padding:0 44px;border-radius:999px;background:#FF9FB6;color:#fff;font-size:27px;font-weight:900;box-shadow:0 7px 0 #E87D97;'},'つぎの もじへ ▶'),
  ]));

  return root;
}

/* =========================================================================
   ステージのスケーリング & 起動
   ========================================================================= */
// スケーリング方式: 対応ブラウザでは zoom を使う。zoom はレイアウトに効くため
// transform:scale のような巨大合成レイヤーを作らず、iPad Safari で「GPUタイルが
// 黒いまま残る」問題が構造的に起きない（2026-07-12 実機検証: displayトグルによる
// レイヤー再構築A/Bでは黒が消えず、zoom切替のみで解消した）。
// zoom 非対応ブラウザ（Firefox 126未満）のみ transform scale にフォールバック。
let useZoom = ('zoom' in document.documentElement.style);
function fitStage() {
  const scaler = document.getElementById('scaler');
  const pad = 16;
  const sx = (window.innerWidth - pad) / 1280;
  const sy = (window.innerHeight - pad) / 800;
  const s = Math.min(sx, sy);
  if (useZoom) { scaler.style.transform = 'none'; scaler.style.zoom = s; }
  else { scaler.style.zoom = ''; scaler.style.transform = 'scale(' + s + ')'; }
  dbg('fit ' + window.innerWidth + 'x' + window.innerHeight + ' s=' + s.toFixed(3) + (useZoom ? ' zoom' : ' transform'));
}
// 回転・リサイズで transform のスケール値が変わると、旧スケールで
// ラスタライズ済みのGPUタイル外が未初期化=黒のまま残るため、再構築も行う
function onViewportChange(){ fitStage(); forceCompositorRepaint(); }
window.addEventListener('resize', () => { dbg('resize'); onViewportChange(); });
// iPad Safari は orientationchange 直後の innerWidth/Height が回転前の値のことが
// あるため、少し遅らせてもう一度合わせる
window.addEventListener('orientationchange', () => { dbg('orientationchange'); setTimeout(onViewportChange, 350); });
// タブ復帰・アプリ切替からの復帰でもGPUタイルが破棄され黒くなることがあるため再構築する
window.addEventListener('pageshow', (e) => { dbg('pageshow' + (e.persisted ? ' bfcache' : '')); forceCompositorRepaint(); });
document.addEventListener('visibilitychange', () => { dbg('visibility ' + document.visibilityState); if (!document.hidden) forceCompositorRepaint(); });

/* =========================================================================
   デバッグモード（URL に ?debug を付けると有効。通常利用には一切影響しない）
   iPad 実機で黒背景問題を切り分けるための画面内ログ＋実験ボタン。
   パネルは #scaler の外（独立レイヤー）なので、黒くなっても必ず見える。
   ========================================================================= */
const DEBUG = new URLSearchParams(location.search).has('debug');
const dbgLines = [];
function dbg(msg) {
  if (!DEBUG) return;
  dbgLines.push((performance.now() / 1000).toFixed(1) + ' ' + msg);
  if (dbgLines.length > 10) dbgLines.shift();
  const el = document.getElementById('dbg-log');
  if (el) el.textContent = dbgLines.join('\n');
}
if (DEBUG) {
  const panel = document.createElement('div');
  panel.style.cssText = 'position:fixed;left:8px;bottom:8px;z-index:99999;background:rgba(0,0,0,.78);color:#7CFC7C;padding:8px 10px;border-radius:10px;font:11px/1.6 Menlo,monospace;max-width:72vw;';
  const log = document.createElement('pre');
  log.id = 'dbg-log';
  log.style.cssText = 'margin:0 0 6px;white-space:pre-wrap;';
  panel.appendChild(log);
  const btn = (label, fn) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = 'margin:0 6px 0 0;padding:6px 10px;font:12px Menlo,monospace;border-radius:6px;border:0;background:#EEE;';
    b.addEventListener('click', fn);
    panel.appendChild(b);
  };
  btn('A:同期再構築', () => { dbg('btn A'); forceCompositorRepaint(); });
  btn('B:1フレーム消す', () => {
    // 仮説検証: 同期トグル(A)は同一タスク内で戻すためコンポジタに届かず
    // レイヤーが再構築されていない可能性がある。Bは display:none を
    // 実際に1フレーム画面に出してから戻す（一瞬まばたきするのは正常）。
    dbg('btn B hide');
    const sc = document.getElementById('scaler');
    sc.style.display = 'none';
    requestAnimationFrame(() => requestAnimationFrame(() => { sc.style.display = ''; dbg('btn B restore'); }));
  });
  btn('C:zoom⇔transform', () => { useZoom = !useZoom; dbg('btn C zoom=' + useZoom); fitStage(); });
  document.body.appendChild(panel);
  dbg('debug on dpr=' + devicePixelRatio);
}

fitStage();
render();
</script>
</body>
